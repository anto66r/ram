name: Deploy Viewer

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy to server
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare deployment package
        run: |
          mkdir -p deploy
          cp index.html deploy/
          cp api.php deploy/
          cp videos.json deploy/

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy via FTP
        env:
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASS: ${{ secrets.FTP_PASS }}
        run: |
          lftp -u "$FTP_USER,$FTP_PASS" -e "set ftp:ssl-allow no; set ftp:passive-mode on; set ftp:use-pasv-address false; set net:timeout 30; set net:max-retries 2; mirror --reverse --verbose ./deploy/ /; quit" ftp://$FTP_HOST
