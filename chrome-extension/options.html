<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      padding: 32px;
      max-width: 480px;
    }
    h1 { font-size: 1.1rem; font-weight: 600; margin-bottom: 24px; }
    label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 6px; }
    input {
      width: 100%;
      padding: 9px 12px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #eee;
      font-size: 0.9rem;
      outline: none;
      margin-bottom: 12px;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #444; }
    button {
      padding: 8px 20px;
      background: #3b82f6;
      color: #fff;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.88rem;
      font-weight: 500;
    }
    button:hover { opacity: 0.85; }
    #status { margin-top: 12px; font-size: 0.82rem; color: #86efac; min-height: 1.2em; }
  </style>
</head>
<body>
  <h1>Video Library Settings</h1>
  <label for="api-url">API URL</label>
  <input type="url" id="api-url" placeholder="https://example.com/api.php" />
  <button id="save">Save</button>
  <p id="status"></p>
  <script src="options.js"></script>
</body>
</html>
