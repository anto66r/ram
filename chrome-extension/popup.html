<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 360px;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      font-size: 0.88rem;
    }

    .wrap { padding: 16px; }

    h1 { font-size: 1rem; font-weight: 600; margin-bottom: 16px; color: #ddd; }

    .field { margin-bottom: 12px; }
    .field label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; }

    input[type="url"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #eee;
      font-size: 0.85rem;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #444; }

    .row { display: flex; gap: 6px; }
    .row input { flex: 1; }

    button {
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: default; }

    .btn-primary { background: #3b82f6; color: #fff; width: 100%; padding: 9px; margin-top: 4px; }
    .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #333; white-space: nowrap; }
    .btn-link { background: none; color: #3b82f6; padding: 0; font-size: 0.8rem; text-decoration: underline; }

    .cover-wrap { margin-bottom: 12px; }
    .cover-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; border: 1px solid #333; display: block; }
    .cover-clear { margin-top: 4px; background: none; border: none; color: #f87171; font-size: 0.75rem; cursor: pointer; padding: 0; }
    .cover-clear:hover { text-decoration: underline; }

    .cover-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border: 1px dashed #333;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 0.78rem;
      margin-bottom: 12px;
    }

    .tags-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-check {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid #333;
      background: #1a1a1a;
      cursor: pointer;
      font-size: 0.75rem;
      color: #aaa;
      user-select: none;
    }
    .tag-check.checked { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .tag-check input { display: none; }

    .msg {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 10px;
    }
    .msg.error { background: #3f1515; border: 1px solid #ef4444; color: #fca5a5; }
    .msg.success { background: #14352a; border: 1px solid #22c55e; color: #86efac; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-config {
      padding: 24px 16px;
      text-align: center;
      color: #888;
    }
    .no-config p { margin-bottom: 12px; font-size: 0.85rem; }

    .settings-link {
      position: absolute;
      top: 14px;
      right: 14px;
      background: none;
      border: none;
      color: #555;
      cursor: pointer;
      font-size: 1rem;
      padding: 0;
      line-height: 1;
    }
    .settings-link:hover { color: #888; }
  </style>
</head>
<body>
  <div style="position:relative">
    <button class="settings-link" id="settings-btn" title="Settings">⚙</button>

    <div id="no-config" class="no-config" style="display:none">
      <p>Set your Video Library API URL to get started.</p>
      <button class="btn-primary" id="go-settings" style="width:auto;padding:8px 20px">Open Settings</button>
    </div>

    <div id="main" class="wrap" style="display:none">
      <h1>Add to Library</h1>

      <div class="field">
        <label>URL</label>
        <div class="row">
          <input type="url" id="url" placeholder="https://..." />
          <button class="btn-secondary" id="fetch-btn">Fetch</button>
        </div>
      </div>

      <div id="cover-wrap" class="cover-wrap" style="display:none">
        <img id="cover-img" alt="cover" />
        <button class="cover-clear" id="clear-cover">Remove image</button>
      </div>
      <div id="cover-placeholder" class="cover-placeholder">No cover image</div>

      <div class="field">
        <label>Tags</label>
        <div class="tags-list" id="tags-list"></div>
      </div>

      <div id="msg" style="display:none"></div>

      <button class="btn-primary" id="add-btn">Add to Library</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
