<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #111;
      color: #eee;
      font-size: 0.88rem;
      height: 100vh;
      overflow-y: auto;
    }

    .wrap { padding: 16px; }

    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: #1a1a1a;
      border-bottom: 1px solid #2a2a2a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 0.95rem; font-weight: 600; }

    button {
      padding: 7px 14px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      font-size: 0.82rem;
      font-weight: 500;
      transition: opacity 0.15s;
    }
    button:hover:not(:disabled) { opacity: 0.85; }
    button:disabled { opacity: 0.45; cursor: default; }

    .btn-primary { background: #3b82f6; color: #fff; width: 100%; padding: 9px; margin-top: 4px; }
    .btn-secondary { background: #2a2a2a; color: #ccc; border: 1px solid #333; white-space: nowrap; }
    .btn-icon { background: none; border: none; color: #555; padding: 4px; font-size: 1rem; line-height: 1; }
    .btn-icon:hover { color: #888; }

    .field { margin-bottom: 14px; }
    .field label { display: block; font-size: 0.75rem; color: #888; margin-bottom: 5px; }

    input[type="url"], input[type="text"] {
      width: 100%;
      padding: 8px 10px;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 6px;
      color: #eee;
      font-size: 0.85rem;
      outline: none;
    }
    input:focus { border-color: #3b82f6; }
    input::placeholder { color: #444; }

    .row { display: flex; gap: 6px; }
    .row input { flex: 1; }

    .cover-wrap { margin-bottom: 14px; }
    .cover-wrap img { width: 100%; aspect-ratio: 16/9; object-fit: cover; border-radius: 6px; border: 1px solid #333; display: block; }
    .cover-clear { margin-top: 4px; background: none; border: none; color: #f87171; font-size: 0.75rem; cursor: pointer; padding: 0; width: auto; }
    .cover-clear:hover { text-decoration: underline; }

    .cover-placeholder {
      width: 100%;
      aspect-ratio: 16/9;
      background: #1a1a1a;
      border: 1px dashed #2a2a2a;
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #444;
      font-size: 0.78rem;
      margin-bottom: 14px;
      cursor: pointer;
      outline: none;
      transition: border-color 0.15s, color 0.15s;
    }
    .cover-placeholder:focus, .cover-placeholder:hover {
      border-color: #3b82f6;
      color: #888;
    }

    .tags-list { display: flex; flex-wrap: wrap; gap: 6px; }
    .tag-check {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 3px 10px;
      border-radius: 999px;
      border: 1px solid #333;
      background: #1a1a1a;
      cursor: pointer;
      font-size: 0.75rem;
      color: #aaa;
      user-select: none;
    }
    .tag-check.checked { background: #1e3a5f; border-color: #3b82f6; color: #93c5fd; }
    .tag-check input { display: none; }

    .msg {
      padding: 8px 12px;
      border-radius: 6px;
      font-size: 0.8rem;
      margin-bottom: 10px;
    }
    .msg.error { background: #3f1515; border: 1px solid #ef4444; color: #fca5a5; }
    .msg.success { background: #14352a; border: 1px solid #22c55e; color: #86efac; }

    .spinner {
      display: inline-block;
      width: 12px; height: 12px;
      border: 2px solid #333;
      border-top-color: #3b82f6;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
      vertical-align: middle;
      margin-right: 5px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    .no-config {
      padding: 32px 16px;
      text-align: center;
      color: #888;
    }
    .no-config p { margin-bottom: 16px; font-size: 0.85rem; line-height: 1.5; }
    .no-config button { width: auto; padding: 8px 20px; }
  </style>
</head>
<body>
  <div class="header">
    <h1>Video Library</h1>
    <button class="btn-icon" id="settings-btn" title="Settings">⚙</button>
  </div>

  <div id="no-config" class="no-config" style="display:none">
    <p>Configure your API URL and credentials to get started.</p>
    <button class="btn-primary" id="go-settings" style="width:auto;padding:8px 20px">Open Settings</button>
  </div>

  <div id="main" class="wrap" style="display:none">
    <div class="field">
      <label>URL</label>
      <div class="row">
        <input type="url" id="url" placeholder="https://..." />
        <button class="btn-secondary" id="fetch-btn">Fetch</button>
      </div>
    </div>

    <div id="cover-wrap" class="cover-wrap" style="display:none">
      <img id="cover-img" alt="cover" />
      <button class="cover-clear" id="clear-cover">Remove image</button>
    </div>
    <div id="cover-placeholder" class="cover-placeholder" tabindex="0">Click then ⌘V / Ctrl+V to paste</div>


    <div id="msg" style="display:none"></div>

    <button class="btn-primary" id="add-btn">Add to Library</button>
  </div>

  <script src="panel.js"></script>
</body>
</html>
